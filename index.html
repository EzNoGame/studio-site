  <!-- Open Graph / social preview -->
  <meta property="og:title" content="Gremlin Makes Games" />

  <style>
    :root {
      --bg: #0d0b1a;
      --bg-2: #16122b;
      --accent: #7cf76b;
      --accent-2: #b46bff;
      --text: #f2f0ff;
      --muted: #a39fc4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 20% 20%, var(--bg-2), var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .logo {
      width: clamp(7rem, 22vw, 11rem);
      height: auto;
      border-radius: 50%;
      border: 3px solid rgba(124, 247, 107, 0.5);
      filter: drop-shadow(0 0 24px rgba(124, 247, 107, 0.35));
    }

    h1 {
      margin-top: 1.25rem;
      font-size: clamp(2rem, 7vw, 4rem);
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .tagline {
      margin-top: 1rem;
      max-width: 34rem;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.25rem);
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 2.5rem;
      padding: 1rem 2rem;
      font-size: 1.15rem;
      font-weight: 700;
      color: #0d0b1a;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 999px;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 30px rgba(124, 247, 107, 0.25);
    }

    .cta:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 40px rgba(180, 107, 255, 0.4); }
    .cta:active { transform: translateY(0) scale(1); }

    .socials {
      display: flex;
      gap: 1.25rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .socials a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 50%;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .socials a:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      background: rgba(124, 247, 107, 0.12);
    }

    .socials svg { width: 1.6rem; height: 1.6rem; fill: currentColor; display: block; }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
