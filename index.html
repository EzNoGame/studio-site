<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gremlin Makes Games</title>
  <meta name="description" content="Gremlin Makes Games — an indie game studio making mischief, one game at a time." />

  <!-- Open Graph / social preview -->
  <meta property="og:title" content="Gremlin Makes Games" />
  <meta property="og:description" content="An indie game studio making mischief, one game at a time." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://gremlinmakesgames.com" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👹</text></svg>" />

  <style>
    :root {
      --bg: #0d0b1a;
      --bg-2: #16122b;
      --accent: #7cf76b;
      --accent-2: #b46bff;
      --text: #f2f0ff;
      --muted: #a39fc4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 20% 20%, var(--bg-2), var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .logo {
      width: clamp(7rem, 22vw, 11rem);
      height: auto;
      border-radius: 50%;
      border: 3px solid rgba(124, 247, 107, 0.5);
      filter: drop-shadow(0 0 24px rgba(124, 247, 107, 0.35));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    h1 {
      margin-top: 1.25rem;
      font-size: clamp(2rem, 7vw, 4rem);
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .tagline {
      margin-top: 1rem;
      max-width: 34rem;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.25rem);
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 2.5rem;
      padding: 1rem 2rem;
      font-size: 1.15rem;
      font-weight: 700;
      color: #0d0b1a;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 999px;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 30px rgba(124, 247, 107, 0.25);
    }

    .cta:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 40px rgba(180, 107, 255, 0.4); }
    .cta:active { transform: translateY(0) scale(1); }

    .games-label {
      margin-top: 3.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .socials {
      margin-top: 2.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .socials a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .socials a:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      background: rgba(124, 247, 107, 0.12);
    }

    .socials svg { width: 1.3rem; height: 1.3rem; fill: currentColor; }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="/Pfp.png" alt="Gremlin Makes Games logo" width="374" height="374" />
    <h1>Gremlin Makes Games</h1>
    <p class="tagline">A gremlin that makes games.</p>

    <p class="games-label">Now playing</p>
    <a class="cta" href="/clapback/">Clapback →</a>

    <nav class="socials" aria-label="Social media">
      <a href="https://bsky.app/profile/gremlinmakesgames.bsky.social" target="_blank" rel="noopener noreferrer" aria-label="Bluesky">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 10.8C10.9 8.6 7.8 4.6 5 2.6 2.3.7 1.3 1 .6 1.3.2 1.5 0 2.1 0 2.7c0 .6.3 5.2.6 6C1.4 10.9 3.4 11.4 5.2 11c-2.7.4-5 1.4-2 4.8 3.4 3.6 4.6-.8 5.2-3 .3-1 .4-1.5.6-1.5.2 0 .3.5.6 1.5.6 2.2 1.8 6.6 5.2 3 3-3.4.7-4.4-2-4.8 1.8.4 3.8-.1 4.6-2.3.3-.8.6-5.4.6-6 0-.6-.2-1.2-.6-1.4-.7-.3-1.7-.6-4.4 1.3-2.8 2-5.9 6-7 8.2z"/></svg>
      </a>
      <a href="https://x.com/Gremlinmakegame" target="_blank" rel="noopener noreferrer" aria-label="X">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.9 1.2h3.7l-8 9.1L24 22.8h-7.4l-5.8-7.6-6.6 7.6H.5l8.6-9.8L0 1.2h7.6l5.2 6.9 6.1-6.9zm-1.3 19.4h2L6.5 3.3H4.4l13.2 17.3z"/></svg>
      </a>
      <a href="https://www.youtube.com/@GremlinMakesGame" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23.5 6.5a3 3 0 0 0-2.1-2.1C19.5 3.9 12 3.9 12 3.9s-7.5 0-9.4.5A3 3 0 0 0 .5 6.5 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.5 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.5zM9.6 15.6V8.4l6.2 3.6-6.2 3.6z"/></svg>
      </a>
      <a href="https://www.tiktok.com/@gremlin.makes.game" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16.6 5.8a4.8 4.8 0 0 1-1-.1 4.9 4.9 0 0 1-3.7-4.2V1h-3.3v13.4a2.9 2.9 0 1 1-2-2.8V8.2a6.2 6.2 0 1 0 5.3 6.1V7.7a8.2 8.2 0 0 0 4.7 1.5V5.8z"/></svg>
      </a>
    </nav>
  </main>

  <footer>
    © <span id="year"></span> Gremlin Makes Games. All rights reserved.
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
